<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLO WORLD | The Next Level</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- GSAP for buttery smooth animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --fg: #ffffff;
            --accent-1: #00f2ff;
            --accent-2: #7000ff;
            --accent-3: #ff007a;
            --font-main: 'Inter', sans-serif;
            --font-heading: 'Syne', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none; /* Custom cursor */
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-main);
            overflow: hidden; /* We'll use a custom scroll or just single page height */
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Custom Cursor --- */
        #cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease-out;
        }

        #cursor-follower {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease-out;
        }

        /* --- Background Canvas --- */
        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
        }

        /* --- Overlay Grain --- */
        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            opacity: 0.04;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_p_Nois_re.png");
        }

        /* --- Main Content --- */
        main {
            position: relative;
            text-align: center;
            z-index: 2;
        }

        .tagline {
            font-family: var(--font-main);
            font-weight: 300;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            color: rgba(255, 255, 255, 0.6);
            overflow: hidden;
        }
        
        .tagline span {
            display: inline-block;
            transform: translateY(100%);
        }

        .title-container {
            position: relative;
            display: block;
            overflow: hidden;
        }

        h1 {
            font-family: var(--font-heading);
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 800;
            line-height: 0.9;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .word {
            display: block;
            position: relative;
            overflow: hidden;
        }

        .char {
            display: inline-block;
            transform: translateY(100%);
        }

        .gradient-text {
            background: linear-gradient(90deg, var(--accent-1), var(--accent-2), var(--accent-3));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 5s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* --- Interactive UI --- */
        .cta-container {
            margin-top: 4rem;
            opacity: 0;
            transform: translateY(30px);
        }

        button {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1.2rem 3rem;
            color: #fff;
            font-family: var(--font-main);
            font-size: 1rem;
            font-weight: 400;
            border-radius: 100px;
            position: relative;
            overflow: hidden;
            transition: border 0.3s ease;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
            z-index: -1;
        }

        button:hover {
            color: black;
            border-color: white;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        /* --- Footer Info --- */
        .footer {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: rgba(255, 255, 255, 0.4);
            z-index: 10;
        }

        .social-links {
            display: flex;
            gap: 2rem;
        }

        .social-links a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .social-links a:hover {
            color: #fff;
        }

    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-follower"></div>
    <div class="grain"></div>
    <canvas id="canvas-bg"></canvas>

    <div class="footer">
        <div>© 2026 DIGITAL EXPERIENCE</div>
        <div class="social-links">
            <a href="#">Instagram</a>
            <a href="#">Twitter</a>
            <a href="#">Awwwards</a>
        </div>
    </div>

    <main>
        <div class="tagline">
            <span>Redefining the digital boundary</span>
        </div>
        <div class="title-container">
            <h1>
                <span class="word" id="word-hello">HELLO</span>
                <span class="word gradient-text" id="word-world">WORLD</span>
            </h1>
        </div>
        <div class="cta-container">
            <button id="main-btn">INITIATE EXPERIENCE</button>
        </div>
    </main>

    <script>
        // --- Custom Cursor Logic ---
        const cursor = document.getElementById('cursor');
        const follower = document.getElementById('cursor-follower');
        let mouseX = 0, mouseY = 0;
        let followerX = 0, followerY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            gsap.to(cursor, { 
                x: mouseX - 10, 
                y: mouseY - 10, 
                duration: 0.1 
            });
            gsap.to(follower, { 
                x: mouseX - 20, 
                y: mouseY - 20, 
                duration: 0.3 
            });
        });

        // Hover Effect on Buttons/Links
        const links = document.querySelectorAll('button, a');
        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                gsap.to(cursor, { scale: 4, duration: 0.3 });
                gsap.to(follower, { opacity: 0, duration: 0.3 });
            });
            link.addEventListener('mouseleave', () => {
                gsap.to(cursor, { scale: 1, duration: 0.3 });
                gsap.to(follower, { opacity: 1, duration: 0.3 });
            });
        });

        // --- Canvas Particle System ---
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width || this.x < 0 || this.y > canvas.height || this.y < 0) {
                    this.reset();
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) {
            particles.push(new Particle());
        }

        function animateCanvas() {
            // Slight clear with trail effect
            ctx.fillStyle = 'rgba(5, 5, 5, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw connecting lines based on distance
            particles.forEach((p, index) => {
                p.update();
                p.draw();

                // Mouse impact
                let dx = mouseX - p.x;
                let dy = mouseY - p.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 150) {
                    p.x -= dx * 0.01;
                    p.y -= dy * 0.01;
                }
            });

            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        // --- Split Text & Entrance Animation ---
        window.addEventListener('load', () => {
            // Setup split text (fake splitting)
            const splitToChars = (element) => {
                const text = element.innerText;
                element.innerHTML = '';
                text.split('').forEach(char => {
                    const span = document.createElement('span');
                    span.innerText = char === ' ' ? '\u00A0' : char;
                    span.classList.add('char');
                    element.appendChild(span);
                });
            };

            const hello = document.getElementById('word-hello');
            const world = document.getElementById('word-world');
            splitToChars(hello);
            splitToChars(world);

            const tl = gsap.timeline();

            tl.to('.tagline span', {
                y: 0,
                duration: 1,
                ease: 'power4.out',
                delay: 0.5
            })
            .to('.char', {
                y: 0,
                duration: 1.5,
                stagger: 0.05,
                ease: 'expo.out',
            }, '-=0.8')
            .to('.cta-container', {
                opacity: 1,
                y: 0,
                duration: 1,
                ease: 'power3.out'
            }, '-=1');

            // Button Interaction
            const btn = document.getElementById('main-btn');
            btn.addEventListener('click', () => {
                gsap.to('main', {
                    scale: 1.2,
                    opacity: 0,
                    duration: 1,
                    ease: 'power4.inOut',
                    onComplete: () => {
                        // Reset or Redirect logic here
                        gsap.to('main', { scale: 1, opacity: 1, duration: 1 });
                        alert("The future has arrived.");
                    }
                });
                
                // Explosion of particles on click
                for(let i=0; i<30; i++) {
                    const p = new Particle();
                    p.x = mouseX;
                    p.y = mouseY;
                    p.speedX = (Math.random() - 0.5) * 15;
                    p.speedY = (Math.random() - 0.5) * 15;
                    p.size = Math.random() * 5 + 2;
                    particles.push(p);
                    // Remove after some time
                    setTimeout(() => {
                        const idx = particles.indexOf(p);
                        if(idx > -1) particles.splice(idx, 1);
                    }, 1000);
                }
            });
        });
    </script>
</body>
</html>
