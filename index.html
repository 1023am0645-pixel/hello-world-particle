<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Particle HELLO WORLD</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050510;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: crosshair;
        }
        canvas {
            display: block;
        }
        #instruction {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            pointer-events: none;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="instruction">Move mouse to repel • Click and hold to scatter</div>
    <div id="info" style="position: absolute; bottom: 10px; width: 100%; text-align: center; color: rgba(255, 255, 255, 0.3); font-size: 11px; letter-spacing: 1px; pointer-events: none;">
        2026-03-17 14:30:17 KST | Seoul, KR (1.215.218.219)
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        
        let width, height;
        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });
        resize();

        // Mouse interaction state
        const mouse = {
            x: null,
            y: null,
            radius: 120,    // Base repel radius
            isDown: false
        };

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });
        window.addEventListener('mouseleave', function() {
            mouse.x = null;
            mouse.y = null;
        });
        window.addEventListener('touchmove', function(event) {
            mouse.x = event.touches[0].clientX;
            mouse.y = event.touches[0].clientY;
        });
        window.addEventListener('touchend', function() {
            mouse.x = null;
            mouse.y = null;
        });

        // Click interaction
        window.addEventListener('mousedown', function() {
            mouse.isDown = true;
            mouse.radius = 400; // Increase blast radius on click
        });
        window.addEventListener('mouseup', function() {
            mouse.isDown = false;
            mouse.radius = 120;
        });
        window.addEventListener('touchstart', function() {
            mouse.isDown = true;
            mouse.radius = 400;
        });
        window.addEventListener('touchend', function() {
            mouse.isDown = false;
            mouse.radius = 120;
        });

        const particlesArray = [];
        
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 2 + 1;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 40) + 5;
                
                // Colors based on x-coordinate for a nice gradient map
                const hue = (x / width) * 360;
                this.color = `hsl(${hue}, 80%, 65%)`;
            }
            
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            
            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                
                // Calculate push force based on mouse distance
                let force = (mouse.radius - distance) / mouse.radius;
                
                // Additional scatter factor if mouse is clicked
                let scatterFactor = mouse.isDown ? 3 : 1;
                let directionX = forceDirectionX * force * this.density * scatterFactor;
                let directionY = forceDirectionY * force * this.density * scatterFactor;
                
                if (distance < mouse.radius && mouse.x !== null) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    // Smooth return to original text shape
                    if (this.x !== this.baseX) {
                        let dxReturn = this.x - this.baseX;
                        this.x -= dxReturn / 15;
                    }
                    if (this.y !== this.baseY) {
                        let dyReturn = this.y - this.baseY;
                        this.y -= dyReturn / 15;
                    }
                }
            }
        }

        function initParticles() {
            particlesArray.length = 0;
            
            ctx.fillStyle = 'white';
            ctx.font = `bold ${Math.min(width / 7, 180)}px "Segoe UI", Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Draw text purely to read pixel data from it
            ctx.clearRect(0, 0, width, height);
            ctx.fillText('HELLO', width / 2, height / 2 - Math.min(height * 0.15, 80));
            ctx.fillText('WORLD', width / 2, height / 2 + Math.min(height * 0.15, 80));
            
            const textCoordinates = ctx.getImageData(0, 0, width, height);
            
            // Generate particles where text pixels exist
            const gap = 5; // Resolution of particles. Smaller gap = more particles
            for (let y = 0, y2 = textCoordinates.height; y < y2; y += gap) {
                for (let x = 0, x2 = textCoordinates.width; x < x2; x += gap) {
                    // Check alpha channel
                    if (textCoordinates.data[(y * 4 * textCoordinates.width) + (x * 4) + 3] > 128) {
                        let positionX = x;
                        let positionY = y;
                        // Add some initial randomness for a nice assembly effect
                        particlesArray.push(new Particle(
                            positionX + (Math.random() - 0.5) * 1000, 
                            positionY + (Math.random() - 0.5) * 1000
                        ));
                    }
                }
            }
        }

        function animate() {
            // Slight motion blur by drawing dark semi-transparent rect instead of clearRect
            ctx.fillStyle = 'rgba(5, 5, 16, 0.25)';
            ctx.fillRect(0, 0, width, height);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].draw();
                particlesArray[i].update();
            }
            
            // Connect nearby particles for a digital/constellation feel
            connect();
            
            requestAnimationFrame(animate);
        }

        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                // Check neighbors
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = dx * dx + dy * dy;
                    
                    if (distance < 500) {
                        opacityValue = 1 - (distance / 500);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacityValue * 0.1})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Wait for fonts to load before drawing to ensure correct text measuring
        if(document.fonts) {
            document.fonts.ready.then(() => {
                initParticles();
                animate();
            });
        } else {
            setTimeout(() => {
                initParticles();
                animate();
            }, 500);
        }
        
    </script>
</body>
</html>
